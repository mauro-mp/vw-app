services:
  postgres:
    image: postgres:16-alpine
    container_name: vw-app-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vwapp
      POSTGRES_PASSWORD: vwapp
      POSTGRES_DB: vwapp
    ports:
      - "5433:5432"
    volumes:
      - vw-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vwapp -d vwapp"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  vw-postgres-data:
