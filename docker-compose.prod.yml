services:
  db:
    image: postgres:16-alpine
    container_name: vw-app-db
    restart: always
    environment:
      POSTGRES_USER: vwapp
      POSTGRES_PASSWORD: vwapp
      POSTGRES_DB: vwapp
    volumes:
      - vw-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vwapp -d vwapp"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: vw-app
    restart: always
    ports:
      - "3003:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://vwapp:vwapp@db:5432/vwapp
    depends_on:
      db:
        condition: service_healthy

volumes:
  vw-pgdata:
